version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/db/migrations"
    queries: "queries"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "TEXT"
            go_type: "string"
